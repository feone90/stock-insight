  <g>
    <text x="36" y="271" fill="#CBD5E1" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700">캔들별 최종 키워드</text>
    <text x="146" y="271" fill="#64748B" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="12">각 날짜의 이유는 아래에도 남아 다시 볼 수 있습니다.</text>

    <rect x="32" y="286" width="190" height="48" rx="12" fill="#7F1D1D" fill-opacity="0.28" stroke="#EF4444" stroke-opacity="0.55"/>
