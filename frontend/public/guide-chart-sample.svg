<svg width="720" height="360" viewBox="0 0 720 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">캔들 클릭 상승 하락 이유 샘플</title>
  <desc id="desc">종목 카드 차트의 캔들 기둥을 클릭하면 daily 분석이 확정한 그날의 상승 이유와 하락 이유 키워드가 열리는 예시</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="720" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.62" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="348" y1="54" x2="662" y2="246" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="720" height="360" rx="28" fill="url(#panel)"/>
  <rect x="1" y="1" width="718" height="358" rx="27" stroke="#334155" stroke-opacity="0.8"/>
  <circle cx="604" cy="62" r="132" fill="url(#glow)"/>

  <text x="32" y="42" fill="#E2E8F0" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="20" font-weight="700">캔들 클릭 = 그날의 상승·하락 이유</text>
  <text x="32" y="66" fill="#94A3B8" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="13">종목 카드의 그래프 기둥을 누르면 daily 최종 키워드가 열립니다.</text>
  <rect x="552" y="28" width="136" height="34" rx="17" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.45"/>
  <text x="579" y="50" fill="#BAE6FD" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="12" font-weight="700">sample graph</text>

  <g filter="url(#softShadow)">
    <rect x="32" y="88" width="656" height="152" rx="18" fill="#020617" stroke="#1E293B"/>
    <path d="M56 122H664M56 158H664M56 194H664" stroke="#1E293B" stroke-width="1"/>
