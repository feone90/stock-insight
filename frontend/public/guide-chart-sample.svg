    <circle cx="532" cy="104" r="13" fill="#EF4444" fill-opacity="0.2" stroke="#FCA5A5" stroke-width="2"/>
    <path d="M532 96L532 72" stroke="#FCA5A5" stroke-width="2" stroke-linecap="round"/>
    <path d="M526 78L532 70L538 78" stroke="#FCA5A5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="404" y="24" width="260" height="68" rx="14" fill="#0F172A" stroke="#EF4444" stroke-opacity="0.55"/>
    <text x="422" y="46" fill="#FECACA" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="12" font-weight="700">클릭한 캔들 · 5/21</text>
    <text x="422" y="67" fill="#FFFFFF" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="16" font-weight="700">상승 이유: 대형 계약 확대</text>
    <text x="574" y="68" fill="#FCA5A5" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="13" font-weight="700">▲</text>
